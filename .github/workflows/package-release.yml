# lint action on https://rhysd.github.io/actionlint/
name: Package Release (Main + Pre)

on:
  # MAIN RELEASE: PRs with release-vX.Y.Z titles on release-... branches
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  # PRE-RELEASE: tags like v1.2.3-alpha.1
  push:
    branches-ignore:
      - "*"
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-next.[0-9]+'

permissions:
  id-token: write      # REQUIRED for npm trusted publishing
  contents: read

# MAIN RELEASE JOBS (only run for PRs)
jobs:
  checkHeadBranch:
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request
    # check head (source) branch
    if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-') }}  # Only for PRs
    steps:
      - run: echo "Run the jobs for the release pull_request"
  
  # get the tag to release from the PR title
  checkTitelTag:
    runs-on: ubuntu-latest
    needs: checkHeadBranch
    if: github.event_name == 'pull_request'  # Only for PRs
    steps:
      # - uses: actions/checkout@v4
      # needs uses: actions/checkout@ if script/module is required
      - name: checkTitelTag
        uses: actions/github-script@v7
        id: get-tag
        with:
          result-encoding: string
          script: |
            if (context.payload.pull_request && context.payload.pull_request.title) {
              const title = context.payload.pull_request.title;
              const parts = title.split('release-');
              if (parts.length === 2) {
                const versionTag = parts[1];
                core.info(`title contains version ${versionTag}`);

                if(versionTag.startsWith('v')){
                  return versionTag;
                }else{
                  core.setFailed(`Your PR title does not follow the naming convention of the version with "release-v..." ${title}`)
                }
              } else {
                core.setFailed(`Your PR title does not follow the naming convention "release-v[0-9]+.[0-9]+.[0-9]" ${title}`)
              }
            }else{
              core.setFailed(`context.payload does not have a pull_request" ${context.payload}`)
            }
      - name: log output
        run: echo "${{ steps.get-tag.outputs.result }}"
    outputs:
      VERSION_TAG: ${{ steps.get-tag.outputs.result }}

  # SHARED JOBS (run for both PRs and tags) --------------------------------------------
  # check if the tag is already published - uses @dlr-eoc/map-ol for test
  checkTagOnNpm:
    runs-on: ubuntu-latest
    needs: [checkHeadBranch, checkTitelTag]
    if: |
      (github.event_name == 'pull_request' && needs.checkTitelTag.outputs.VERSION_TAG != '') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: checkout tag
        id: checkout
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            git fetch --all --tags
            git checkout ${{ github.ref }}
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            git fetch --all --tags
            git checkout ${{ needs.checkTitelTag.outputs.VERSION_TAG }}
            echo "tag=${{ needs.checkTitelTag.outputs.VERSION_TAG }}" >> $GITHUB_OUTPUT
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - run: rm -f .npmrc
      
      - uses: ./.github/actions/check-tag-on-npm
        with:
          npmPackageName: "@dlr-eoc/map-ol"
          tag: ${{ steps.checkout.outputs.tag }}

  build:
    needs: [checkHeadBranch, checkTitelTag, checkTagOnNpm]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && needs.checkTitelTag.outputs.VERSION_TAG != '') ||
      github.event_name == 'push' || needs.checkHeadBranch.result != 'failure' || needs.checkTitelTag.result != 'failure'
    steps:
      # Your existing build job exactly as-is
      - uses: actions/checkout@v4
      - name: checkout tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            git fetch --all --tags
            git checkout ${{ github.ref }}
          else
            git fetch --all --tags
            git checkout ${{ needs.checkTitelTag.outputs.VERSION_TAG }}
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests (push only)
        if: ${{ github.event_name == 'push' }}
        uses: ./.github/actions/test
      - name: build
        run: |
           npm ci
           npm run build
      - name: Archive dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "dist"
          path: dist
      - uses: actions/checkout@v4
      - name: checkout tag
        run: |
          git fetch --all --tags
          git checkout ${{ needs.checkTitelTag.outputs.VERSION_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: build
        run: |
           npm ci
           npm run build
      - name: Archive dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "dist"
          path: dist

  # if build works fine we can proceed, add a label and create the release
  checkLabel:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'  # Only for PRs
    steps:
      - name: checkLabel
        uses: actions/github-script@v7
        with:
          script: |
            if(context.payload.pull_request.labels){
              const hasLabel = context.payload.pull_request.labels.find(i => i.name === 'RELEASE');
              if(!hasLabel){
                core.setFailed(`pull_request hasLabel 'RELEASE' ===  ${hasLabel}`)
              }
            }else{
              core.setFailed(`context.payload does not have a pull_request" ${context.payload}`);
            }

  gh-release:
    needs: [build, checkLabel]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && needs.checkTitelTag.outputs.VERSION_TAG != '') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || needs.checkLabel.result != 'failure' 
    steps:
      # Your existing gh-release logic, but dynamic tag:
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || needs.checkTitelTag.outputs.VERSION_TAG }}
          prerelease: ${{ github.event_name == 'push' }}

  # download artifacts and publish packages
  publish-gpr:
    needs: [build, gh-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist result from job build
        uses: actions/download-artifact@v4
        with:
          name: "dist"
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com/
          scope: "@dlr-eoc"
      - run: npm ci
      ### update npm to >8.19 for publish https://github.com/npm/cli/issues/2453 https://github.com/npm/cli/issues/3573
      - run: npm i -g npm@8.19.3
      - run: rm -f .npmrc
      ### for each module in dist update package.json and create .npmrc
      - run: node scripts/library/index.js --update-package=https://npm.pkg.github.com/
      ### for each module in dist publish frontend-libraries to registry
      - run: |
          for dir in ./dist/*/
          do
              dir=${dir%*/}
              npm publish "$dir"
          done
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  publish-npm:
    needs: [build, gh-release]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && needs.checkTitelTag.outputs.VERSION_TAG != '') ||
      github.event_name == 'push'
    steps:
      # Your existing setup steps...
      - uses: actions/checkout@v4
      - name: Download dist result from job build
        uses: actions/download-artifact@v4
        with:
          name: "dist"
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'
          scope: "@dlr-eoc"
      - run: npm ci
      ### update npm to >8.19 for publish https://github.com/npm/cli/issues/2453 https://github.com/npm/cli/issues/3573
      - run: npm i -g npm@latest  # Latest npm for trusted publishing
      - run: rm -f .npmrc
      ### for each module in dist update package.json and create .npmrc
      - run: node scripts/library/index.js --update-package=https://registry.npmjs.org/
      ### for each module in dist publish frontend-libraries to npm registry
      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Pre-release: use tag name from git tag
            TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "Publishing pre-release with tag: $TAG"
            for dir in ./dist/*/; do
              dir=${dir%*/}
              npm publish "$dir" --access public --tag "$TAG" --provenance
            done
          else
            # Main release: use VERSION_TAG from PR title
            echo "Publishing main release: ${{ needs.checkTitelTag.outputs.VERSION_TAG }}"
            for dir in ./dist/*/; do
              dir=${dir%*/}
              npm publish "$dir" --access public --provenance
            done
          fi